<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SDL - Mon Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
        .profile-container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-edit { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto 20px; overflow: hidden; position: relative; }
        .avatar-edit img { width: 100%; height: 100%; object-fit: cover; }
        input, textarea { width: 100%; padding: 12px; background: #020617; border: 1px solid #334155; color: white; border-radius: 10px; margin-bottom: 15px; }
        .btn-save { background: var(--accent); color: #020617; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="/" style="color: var(--accent); text-decoration: none;"><i class="fas fa-arrow-left"></i> Retour</a>
        <h2 style="text-align:center;">Mon Profil Étudiant</h2>
        
        <form action="/profil" method="POST" enctype="multipart/form-data">
            <div class="avatar-edit">
                <img src="{{ url_for('static', filename='uploads/' + user.photo) if user.photo else 'https://via.placeholder.com/150' }}">
            </div>
            <label>Changer la photo</label>
            <input type="file" name="photo">
            
            <label>Ma Bio / Présentation</label>
            <textarea name="bio" rows="4">{{ user.bio or '' }}</textarea>
            
            <button type="submit" class="btn-save">Enregistrer les modifications</button>
        </form>
    </div>
</body>
</html>
